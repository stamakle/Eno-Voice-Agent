name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Python compile
        run: |
          PYTHONPATH=backend python -m py_compile $(find backend -name '*.py' -print) $(find tests -name '*.py' -print)
      - name: Alembic upgrade
        env:
          ENGLISH_TECH_DATABASE_URL: sqlite:///./ci_test.db
          ENGLISH_TECH_DATABASE_FALLBACK_URL: sqlite:///./ci_test.db
        run: |
          python -m alembic upgrade head
      - name: Backend tests
        run: |
          PYTHONPATH=backend python -m unittest discover -s tests -p 'test_*.py'

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
      - name: Flutter test
        run: flutter test
