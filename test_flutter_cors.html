<!DOCTYPE html>
<html>
<head>
<title>CORS Test</title>
</head>
<body>
<button onclick="testCors()">Test CORS</button>
<pre id="result"></pre>
<script>
async function testCors() {
  try {
    const response = await fetch('http://127.0.0.1:8091/api/coach/bootstrap');
    const text = await response.text();
    document.getElementById('result').innerText = `Status: ${response.status}\nBody: ${text}`;
  } catch (error) {
    document.getElementById('result').innerText = `Error: ${error.message}`;
  }
}
</script>
</body>
</html>
